[workspace]
channels = ["conda-forge"]
name = "LST-AI"
platforms = ["linux-64"]
version = "1.1.0"

[dependencies]
python = "3.9.*"
numpy = "<1.24.4"
pillow = ">=9.0"
scipy = ">=1.9.0"
scikit-image = ">=0.21.0"
nibabel = ">=4.0"
requests = ">=2.28"
simpleitk = "*"
greedyreg = "*"

[pypi-dependencies]
tensorflow = ">=2.13,<2.16"
torch = "<=2.1.0"
hd-bet = "<2"

[activation.env]
PYTHONPATH = "$PIXI_PROJECT_ROOT"
PATH = "$PIXI_PROJECT_ROOT/LST_AI:$PATH"
XLA_FLAGS = "--xla_gpu_cuda_data_dir=$PIXI_PROJECT_ROOT/LST_AI/.cuda_data"

[activation]
scripts = ["scripts/setup_cuda_data.sh"]

[tasks]
download-models = "bash scripts/download_models.sh"
lst = { cmd = "python $PIXI_PROJECT_ROOT/LST_AI/lst", depends-on = ["download-models"] }
